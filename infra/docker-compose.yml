services:
  postgres:
    image: postgres:16-alpine
    container_name: projectx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: projectx
      POSTGRES_PASSWORD: projectx_dev
      POSTGRES_DB: projectx
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U projectx -d projectx"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg-data:
