services:
  - type: web
    name: projectx-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        value: ""
      - key: CORS_ORIGINS
        value: "*"
